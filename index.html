<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Examen — Materiales en Maquinaria Pesada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-base:#0a0e17;
    --bg-card:#141c2e;
    --bg-option:#1b2540;
    --bg-option-hover:#243156;
    --border:#283655;
    --border-light:#3a4d7a;
    --text:#e8edf5;
    --text-muted:#8b97b0;
    --accent-amber:#ffb627;
    --accent-green:#39ff8c;
    --accent-red:#ff5470;
    --tag-polimeros:#7fe0ff;
    --tag-ceramicas:#ffab66;
    --tag-compuestos:#c9a8ff;
    --tag-cobre:#5cf2c8;
    --radius:12px;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{ min-height:100%; }

  body{
    font-family:'Inter', sans-serif;
    background-color:var(--bg-base);
    background-image:
      radial-gradient(circle at 15% -10%, rgba(255,182,39,0.06), transparent 42%),
      radial-gradient(circle at 90% 5%, rgba(57,255,140,0.05), transparent 40%);
    color:var(--text);
    min-height:100vh;
    padding:24px 16px 60px;
    line-height:1.6;
  }

  .app{ max-width:840px; margin:0 auto; }

  /* ---------- HEADER / PROGRESS ---------- */
  .topbar{
    background:rgba(13,18,30,0.85);
    backdrop-filter:blur(10px);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:18px 22px;
    margin-bottom:24px;
    position:sticky;
    top:12px;
    z-index:10;
  }

  .brand h1{
    font-family:'Rajdhani', sans-serif;
    font-weight:700;
    font-size:1.35rem;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:#fdfdfd;
  }

  .brand p{
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
    color:var(--text-muted);
    letter-spacing:0.03em;
    margin-top:4px;
  }

  .progress-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:16px 0 8px;
    gap:8px;
    flex-wrap:wrap;
  }

  .mono-tag{
    font-family:'JetBrains Mono', monospace;
    font-size:0.74rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--text-muted);
  }

  .mono-tag.accent{ color:var(--accent-green); }

  .progress-track{
    position:relative;
    height:10px;
    background:var(--bg-option);
    border:1px solid var(--border);
    border-radius:6px;
    overflow:hidden;
  }

  .progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg, var(--accent-amber), #ffe08a);
    box-shadow:0 0 14px rgba(255,182,39,0.55);
    transition:width 0.45s ease;
  }

  .progress-track::after{
    content:"";
    position:absolute;
    inset:0;
    background:repeating-linear-gradient(
      90deg,
      transparent 0,
      transparent calc(100%/15 - 2px),
      var(--bg-base) calc(100%/15 - 2px),
      var(--bg-base) calc(100%/15)
    );
    pointer-events:none;
  }

  /* ---------- CARD ---------- */
  .quiz-card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:28px;
  }

  .fade-in{ animation:fadeSlide 0.45s ease; }

  @keyframes fadeSlide{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .meta-row{
    display:flex;
    gap:10px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }

  .badge{
    font-family:'JetBrains Mono', monospace;
    font-size:0.68rem;
    text-transform:uppercase;
    letter-spacing:0.09em;
    padding:6px 12px;
    border-radius:999px;
    border:1px solid var(--border-light);
    color:var(--text-muted);
    background:rgba(255,255,255,0.02);
  }

  .badge-type{ color:var(--accent-amber); border-color:var(--accent-amber); background:rgba(255,182,39,0.08); }
  .tag-polimeros{ color:var(--tag-polimeros); border-color:var(--tag-polimeros); background:rgba(127,224,255,0.08); }
  .tag-ceramicas{ color:var(--tag-ceramicas); border-color:var(--tag-ceramicas); background:rgba(255,171,102,0.08); }
  .tag-compuestos{ color:var(--tag-compuestos); border-color:var(--tag-compuestos); background:rgba(201,168,255,0.08); }
  .tag-cobre{ color:var(--tag-cobre); border-color:var(--tag-cobre); background:rgba(92,242,200,0.08); }

  .question-text{
    font-size:1.05rem;
    font-weight:500;
    color:#f5f8fc;
    margin-bottom:22px;
  }

  /* ---------- OPTIONS ---------- */
  #optionsList{
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:20px;
  }

  .option{
    display:flex;
    align-items:flex-start;
    gap:14px;
    background:var(--bg-option);
    border:1px solid var(--border);
    border-left:4px solid transparent;
    border-radius:10px;
    padding:14px 16px;
    cursor:pointer;
    transition:transform 0.2s ease, background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .option:hover:not(.disabled){
    background:var(--bg-option-hover);
    border-color:var(--accent-amber);
    border-left-color:var(--accent-amber);
    transform:translateX(6px);
    box-shadow:0 4px 18px -4px rgba(255,182,39,0.35);
  }

  .option:focus-visible{
    outline:2px solid var(--accent-amber);
    outline-offset:2px;
  }

  .option.selected{
    border-color:var(--accent-amber);
    border-left-color:var(--accent-amber);
    background:rgba(255,182,39,0.07);
  }

  .option.disabled{ cursor:default; }
  .option.disabled:hover{ transform:none; box-shadow:none; }

  .option.correct-answer{
    border-color:var(--accent-green);
    border-left-color:var(--accent-green);
    background:rgba(57,255,140,0.07);
    box-shadow:0 4px 18px -4px rgba(57,255,140,0.3);
  }

  .option.incorrect-answer{
    border-color:var(--accent-red);
    border-left-color:var(--accent-red);
    background:rgba(255,84,112,0.07);
    box-shadow:0 4px 18px -4px rgba(255,84,112,0.3);
  }

  .option-letter{
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:0.85rem;
    width:28px; height:28px;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    border:1px solid var(--border-light);
    border-radius:6px;
    color:var(--text-muted);
    transition:color 0.2s ease, border-color 0.2s ease;
  }

  .option:hover:not(.disabled) .option-letter{ color:var(--accent-amber); border-color:var(--accent-amber); }
  .option.selected .option-letter{ color:var(--accent-amber); border-color:var(--accent-amber); }
  .option.correct-answer .option-letter{ color:var(--accent-green); border-color:var(--accent-green); }
  .option.incorrect-answer .option-letter{ color:var(--accent-red); border-color:var(--accent-red); }

  .option-text{ font-size:0.95rem; padding-top:2px; }

  /* ---------- FEEDBACK ---------- */
  .feedback-panel{
    border-radius:10px;
    padding:16px 18px;
    margin-bottom:20px;
    border-left:4px solid;
  }

  .feedback-correct{ background:rgba(57,255,140,0.06); border-color:var(--accent-green); }
  .feedback-incorrect{ background:rgba(255,84,112,0.06); border-color:var(--accent-red); }

  .feedback-label{
    font-family:'JetBrains Mono', monospace;
    font-size:0.68rem;
    text-transform:uppercase;
    letter-spacing:0.09em;
    color:var(--text-muted);
    display:block;
    margin-bottom:6px;
  }

  .feedback-title{
    font-family:'Rajdhani', sans-serif;
    font-weight:700;
    font-size:1.05rem;
    letter-spacing:0.02em;
    margin-bottom:8px;
  }

  .feedback-correct .feedback-title{ color:var(--accent-green); }
  .feedback-incorrect .feedback-title{ color:var(--accent-red); }

  .feedback-justification{
    font-size:0.92rem;
    color:var(--text);
    opacity:0.92;
  }

  /* ---------- BUTTONS ---------- */
  .primary-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:10px;
    background:var(--accent-amber);
    color:#1a1300;
    font-family:'Rajdhani', sans-serif;
    font-weight:700;
    font-size:1rem;
    text-transform:uppercase;
    letter-spacing:0.07em;
    cursor:pointer;
    transition:transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
  }

  .primary-btn:hover:not(:disabled){
    background:#ffc850;
    box-shadow:0 0 24px rgba(255,182,39,0.45);
    transform:translateY(-2px);
  }

  .primary-btn:disabled{
    background:var(--bg-option);
    color:var(--text-muted);
    cursor:not-allowed;
    box-shadow:none;
  }

  .secondary-btn{
    padding:14px 34px;
    border:1px solid var(--accent-amber);
    background:transparent;
    color:var(--accent-amber);
    border-radius:10px;
    font-family:'Rajdhani', sans-serif;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.07em;
    font-size:0.95rem;
    cursor:pointer;
    transition:background-color 0.2s ease, box-shadow 0.2s ease;
  }

  .secondary-btn:hover{
    background:rgba(255,182,39,0.1);
    box-shadow:0 0 20px rgba(255,182,39,0.25);
  }

  /* ---------- RESULTS ---------- */
  .results-screen{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:40px 28px;
    text-align:center;
  }

  .gauge-wrap{
    position:relative;
    width:200px; height:200px;
    margin:18px auto 14px;
  }

  .gauge-wrap svg{ transform:rotate(-90deg); width:100%; height:100%; }

  .gauge-track{ fill:none; stroke:var(--border); stroke-width:14; }

  .gauge-fill{
    fill:none;
    stroke:var(--accent-amber);
    stroke-width:14;
    stroke-linecap:round;
    stroke-dasharray:534;
    stroke-dashoffset:534;
    transition:stroke-dashoffset 1.1s ease, stroke 0.4s ease;
  }

  .gauge-text{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }

  .gauge-score{
    font-family:'Rajdhani', sans-serif;
    font-weight:700;
    font-size:2.4rem;
    color:#fdfdfd;
  }

  .gauge-pct{
    font-family:'JetBrains Mono', monospace;
    font-size:0.85rem;
    color:var(--text-muted);
    letter-spacing:0.05em;
  }

  .result-message{
    font-size:1rem;
    max-width:480px;
    margin:8px auto 28px;
    color:var(--text);
  }

  .breakdown-grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    margin-bottom:30px;
  }

  .led{
    width:34px; height:34px;
    border-radius:7px;
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace;
    font-size:0.75rem; font-weight:700;
    border:1px solid;
  }

  .led-correct{ background:rgba(57,255,140,0.1); border-color:var(--accent-green); color:var(--accent-green); }
  .led-incorrect{ background:rgba(255,84,112,0.1); border-color:var(--accent-red); color:var(--accent-red); }

  /* ---------- MISC ---------- */
  [hidden]{ display:none !important; }

  @media (max-width:560px){
    .quiz-card{ padding:20px; }
    .question-text{ font-size:1rem; }
    .gauge-wrap{ width:170px; height:170px; }
    .gauge-score{ font-size:2rem; }
    .results-screen{ padding:30px 18px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="brand">
      <h1>⚙ Diagnóstico de Materiales</h1>
      <p>Simulador · Ciencia y Tecnología de Materiales aplicada a Maquinaria Pesada — Semanas 7 a 14</p>
    </div>
    <div class="progress-row">
      <span id="qCounter" class="mono-tag">PREGUNTA 1 / 15</span>
      <span id="scoreCounter" class="mono-tag accent">ACIERTOS 0/15</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </header>

  <main>
    <section class="quiz-card fade-in" id="quizCard">
      <div class="meta-row">
        <span class="badge badge-type" id="typeBadge"></span>
        <span class="badge" id="categoryBadge"></span>
      </div>
      <p class="question-text" id="questionText"></p>
      <ul id="optionsList"></ul>
      <div class="feedback-panel" id="feedbackPanel" hidden>
        <span class="feedback-label">Análisis técnico</span>
        <div class="feedback-title" id="feedbackTitle"></div>
        <p class="feedback-justification" id="feedbackJustification"></p>
      </div>
      <button class="primary-btn" id="evalBtn" disabled>Evaluar Respuesta</button>
    </section>

    <section class="results-screen" id="resultsScreen" hidden>
      <span class="badge badge-type">Resultado Final</span>
      <div class="gauge-wrap">
        <svg viewBox="0 0 200 200">
          <circle class="gauge-track" cx="100" cy="100" r="85"></circle>
          <circle class="gauge-fill" id="gaugeFill" cx="100" cy="100" r="85"></circle>
        </svg>
        <div class="gauge-text">
          <span class="gauge-score" id="resultScoreText">0/15</span>
          <span class="gauge-pct" id="resultPct">0%</span>
        </div>
      </div>
      <p class="result-message" id="resultMessage"></p>
      <div class="breakdown-grid" id="breakdownGrid"></div>
      <button class="secondary-btn" id="restartBtn">Reintentar Simulador</button>
    </section>
  </main>

</div>

<script>
const questions = [
  {
    category:"Polímeros · Elastómeros",
    tagClass:"tag-polimeros",
    type:"Caso Práctico",
    question:"Un cilindro hidráulico de una excavadora opera con aceite mineral a temperaturas de hasta 90°C. Durante una mantención de emergencia, un técnico reemplaza los O-rings originales de Nitrilo (NBR) por unos de EPDM (Etileno-Propileno-Dieno) porque eran los únicos disponibles en bodega. ¿Qué consecuencia técnica es más probable en pocas horas de operación?",
    options:[
      "Ninguna; el EPDM es compatible con todos los fluidos industriales y reemplaza sin problemas al NBR.",
      "El EPDM se hinchará (swelling) y perderá propiedades mecánicas, ya que tiene muy baja resistencia a hidrocarburos derivados del petróleo, provocando fugas en el sello.",
      "El EPDM aumentará su dureza Shore, mejorando el sellado a alta presión sin efectos negativos.",
      "El EPDM se sublimará por encima de 70°C, generando vacío dentro del circuito hidráulico."
    ],
    correct:1,
    justification:"El Etileno-Propileno-Dieno (EPDM) tiene excelente resistencia a fluidos polares (agua, vapor, líquidos de freno base glicol) y a la intemperie (ozono, UV), pero una resistencia muy pobre a los aceites minerales e hidrocarburos derivados del petróleo: el aceite hidráulico penetra su estructura molecular, provoca hinchamiento (swelling), pérdida de propiedades mecánicas y fallas de sellado prematuras. Para sellos de sistemas hidráulicos con aceite mineral, el estándar de la industria es el Nitrilo (NBR) o, para temperaturas más altas, el Fluoroelastómero (FKM/Viton). Confundir EPDM con NBR es un error de compatibilidad química frecuente y costoso en mantención de maquinaria pesada."
  },
  {
    category:"Polímeros · Termoplásticos",
    tagClass:"tag-polimeros",
    type:"Caso Práctico",
    question:"Se debe diseñar el visor protector de la cabina de un chancador (triturador de roca), expuesto a impactos de partículas proyectadas a alta velocidad. Se evalúan PVC rígido, Polietileno de Alta Densidad (HDPE) y Policarbonato (PC). ¿Cuál es la elección técnicamente correcta y por qué?",
    options:[
      "PVC rígido, porque es transparente, económico y de alta tenacidad al impacto.",
      "HDPE, porque su alta resistencia química y transparencia lo hacen ideal para visores.",
      "Policarbonato, por su excepcional tenacidad al impacto y transparencia óptica, propiedades por las que se usa en blindajes antibalas y visores de seguridad industrial.",
      "Cualquiera de los tres es igualmente válido, ya que todos los termoplásticos tienen la misma resistencia al impacto."
    ],
    correct:2,
    justification:"El policarbonato combina una transparencia óptica cercana a la del vidrio con una tenacidad al impacto extraordinaria (su resistencia Izod supera ampliamente a la de otros termoplásticos transparentes), por lo que se utiliza en visores de seguridad, blindajes antibalas y cabinas expuestas a proyección de partículas. El PVC rígido es más frágil ante impactos y de baja transparencia en grados industriales, mientras que el HDPE es opaco y carece de la rigidez óptica necesaria para una ventana. Además, el PC mantiene buen desempeño mecánico hasta temperaturas cercanas a su Tg (~147°C), suficiente para ambientes industriales típicos."
  },
  {
    category:"Polímeros · Termoestables",
    tagClass:"tag-polimeros",
    type:"Caso Práctico",
    question:"Un componente estructural de fibra de carbono con matriz de resina epoxi, usado en un brazo robótico de una línea de mantenimiento, queda expuesto a 300°C durante varios minutos tras un incendio en la planta. Comparado con un termoplástico equivalente sometido a la misma temperatura, ¿qué diferencia fundamental en el comportamiento se observa?",
    options:[
      "La resina epoxi se funde y puede ser remoldeada para reutilizarse, igual que un termoplástico.",
      "La resina epoxi, al ser termoestable (red reticulada con enlaces covalentes cruzados), no funde: se degrada y carboniza de forma permanente e irreversible, perdiendo su estructura química.",
      "Ambos materiales se comportan igual, ya que la presencia de fibra de carbono determina el comportamiento térmico, no la matriz.",
      "La resina epoxi se evapora completamente sin dejar residuo alguno, a diferencia de los termoplásticos."
    ],
    correct:1,
    justification:"Las resinas epoxi curadas forman una red tridimensional de enlaces covalentes cruzados (entrecruzamiento o curado), lo que las clasifica como termoestables. A diferencia de los termoplásticos, que se ablandan o funden de forma reversible al superar su Tg o Tm y pueden remoldearse, los termoestables no funden: al superar su temperatura de degradación sufren pirólisis y carbonización, un proceso químico irreversible que destruye permanentemente su estructura y propiedades. Por eso, tras un evento térmico severo, un componente de matriz epoxi debe descartarse y no puede 'repararse' por fusión."
  },
  {
    category:"Polímeros · Comportamiento Térmico",
    tagClass:"tag-polimeros",
    type:"Tecnicismo",
    question:"Un ingeniero debe seleccionar el elastómero para una manguera hidráulica que operará en el Altiplano chileno, donde la temperatura nocturna desciende hasta -20°C. El elastómero candidato tiene una Temperatura de Transición Vítrea (Tg) de -10°C. ¿Qué ocurrirá durante la operación nocturna?",
    options:[
      "La manguera se fundirá parcialmente, ya que -20°C está por debajo de su Tg.",
      "No habrá ningún cambio relevante, ya que la Tg solo aplica a materiales cerámicos.",
      "Por debajo de su Tg, el elastómero pasará de un estado gomoso/flexible a un estado vítreo, rígido y frágil, aumentando drásticamente el riesgo de fractura frágil ante flexión o impacto.",
      "La manguera se volverá más flexible, ya que el frío reduce la fricción intermolecular entre cadenas."
    ],
    correct:2,
    justification:"La Temperatura de Transición Vítrea (Tg) marca el punto en que las regiones amorfas de un polímero pasan de un estado gomoso/flexible (por encima de Tg) a un estado vítreo, rígido y frágil (por debajo de Tg). Si la temperatura de servicio cae por debajo de la Tg del elastómero (-20°C versus una Tg de -10°C), el material pierde su capacidad de absorber deformación y se vuelve susceptible a fisuras y fracturas frágiles bajo flexión. La Temperatura de Fusión (Tm) corresponde a la fusión de las regiones cristalinas en polímeros semicristalinos y no es el parámetro relevante para la fragilización por frío. En climas extremos, la Tg del elastómero siempre debe quedar muy por debajo de la mínima temperatura de operación."
  },
  {
    category:"Cerámicas Industriales",
    tagClass:"tag-ceramicas",
    type:"Tecnicismo",
    question:"En sistemas de freno y embrague de maquinaria pesada de alto rendimiento se utilizan discos cerámicos (a base de carburo de silicio, SiC, o compuestos cerámicos) en lugar de discos metálicos convencionales. ¿Cuál es la principal ventaja técnica y cuál la principal desventaja inherente a su naturaleza cerámica?",
    options:[
      "Ventaja: alta conductividad eléctrica. Desventaja: bajo punto de fusión.",
      "Ventaja: excelente resistencia al desgaste, dureza y estabilidad del coeficiente de fricción incluso por encima de 1000°C, sin 'fading'. Desventaja: baja tenacidad a la fractura, susceptibles a fallas catastróficas por impacto o choque térmico.",
      "Ventaja: son más económicas de producir que el acero. Desventaja: se oxidan rápidamente en presencia de humedad ambiental.",
      "Ventaja: alta ductilidad, permitiendo deformación plástica antes de la falla. Desventaja: peso excesivo frente al acero."
    ],
    correct:1,

let currentIndex = 0;
let score = 0;
let selectedIndex = null;
let answered = false;
let userAnswers = new Array(questions.length).fill(null);

const quizCard = document.getElementById('quizCard');
const optionsList = document.getElementById('optionsList');
const evalBtn = document.getElementById('evalBtn');
const feedbackPanel = document.getElementById('feedbackPanel');
const feedbackTitle = document.getElementById('feedbackTitle');
const feedbackJustification = document.getElementById('feedbackJustification');
const progressFill = document.getElementById('progressFill');
const qCounter = document.getElementById('qCounter');
const scoreCounter = document.getElementById('scoreCounter');
const resultsScreen = document.getElementById('resultsScreen');

function triggerAnim(el){
  el.classList.remove('fade-in');
  void el.offsetWidth;
  el.classList.add('fade-in');
}

function renderQuestion(){
  const q = questions[currentIndex];

  qCounter.textContent = `PREGUNTA ${currentIndex + 1} / ${questions.length}`;
  scoreCounter.textContent = `ACIERTOS ${score}/${questions.length}`;
  progressFill.style.width = (currentIndex / questions.length * 100) + '%';

  document.getElementById('typeBadge').textContent = q.type;
  const catBadge = document.getElementById('categoryBadge');
  catBadge.textContent = q.category;
  catBadge.className = 'badge ' + q.tagClass;

  document.getElementById('questionText').textContent = q.question;

  optionsList.innerHTML = '';
  q.options.forEach((opt, i) => {
    const li = document.createElement('li');
    li.className = 'option';
    li.tabIndex = 0;
    li.setAttribute('role', 'button');
    li.innerHTML = `<span class="option-letter">${String.fromCharCode(65 + i)}</span><span class="option-text"></span>`;
    li.querySelector('.option-text').textContent = opt;
    li.addEventListener('click', () => selectOption(i));
    li.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectOption(i); }
    });
    optionsList.appendChild(li);
  });

  selectedIndex = null;
  answered = false;
  feedbackPanel.hidden = true;
  feedbackPanel.className = 'feedback-panel';

  evalBtn.textContent = 'Evaluar Respuesta';
  evalBtn.disabled = true;
  evalBtn.onclick = evaluateAnswer;

  triggerAnim(quizCard);
}

function selectOption(i){
  if (answered) return;
  selectedIndex = i;
  const opts = optionsList.querySelectorAll('.option');
  opts.forEach((el, idx) => el.classList.toggle('selected', idx === i));
  evalBtn.disabled = false;
}

function evaluateAnswer(){
  if (selectedIndex === null || answered) return;
  answered = true;

  const q = questions[currentIndex];
  const opts = optionsList.querySelectorAll('.option');
  opts.forEach((el, idx) => {
    el.classList.add('disabled');
    el.tabIndex = -1;
    if (idx === q.correct) el.classList.add('correct-answer');
    if (idx === selectedIndex && idx !== q.correct) el.classList.add('incorrect-answer');
  });

  const isCorrect = selectedIndex === q.correct;
  userAnswers[currentIndex] = isCorrect;
  if (isCorrect) score++;
  scoreCounter.textContent = `ACIERTOS ${score}/${questions.length}`;
  progressFill.style.width = ((currentIndex + 1) / questions.length * 100) + '%';

  feedbackPanel.hidden = false;
  feedbackPanel.className = 'feedback-panel ' + (isCorrect ? 'feedback-correct' : 'feedback-incorrect');
  feedbackTitle.textContent = isCorrect ? '✅ Respuesta Correcta' : '❌ Respuesta Incorrecta';
  feedbackJustification.textContent = q.justification;

  evalBtn.disabled = false;
  evalBtn.textContent = (currentIndex === questions.length - 1) ? 'Ver Resultados' : 'Siguiente Pregunta';
  evalBtn.onclick = () => {
    if (currentIndex === questions.length - 1) {
      showResults();
    } else {
      currentIndex++;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  };
}

function showResults(){
  quizCard.hidden = true;
  resultsScreen.hidden = false;
  triggerAnim(resultsScreen);

  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('resultScoreText').textContent = `${score}/${questions.length}`;
  document.getElementById('resultPct').textContent = `${pct}%`;

  let msg, color;
  if (pct >= 90){
    msg = '¡Dominio total! Estás más que listo para enfrentar el examen.';
    color = 'var(--accent-green)';
  } else if (pct >= 70){
    msg = 'Buen manejo del contenido. Repasa los conceptos marcados en rojo antes del examen.';
    color = 'var(--accent-green)';
  } else if (pct >= 50){
    msg = 'Nivel intermedio. Refuerza los conceptos de Cerámicas, Compuestos y Pulvimetalurgia.';
    color = 'var(--accent-amber)';
  } else {
    msg = 'Necesitas repasar a fondo el material de las semanas 7 a 14 antes de presentarte al examen.';
    color = 'var(--accent-red)';
  }
  document.getElementById('resultMessage').textContent = msg;

  const circumference = 2 * Math.PI * 85;
  const gaugeFill = document.getElementById('gaugeFill');
  gaugeFill.style.stroke = color;
  gaugeFill.style.strokeDasharray = circumference;
  gaugeFill.style.strokeDashoffset = circumference;
  requestAnimationFrame(() => {
    setTimeout(() => {
      gaugeFill.style.strokeDashoffset = circumference - (circumference * pct / 100);
    }, 80);
  });

  const grid = document.getElementById('breakdownGrid');
  grid.innerHTML = '';
  userAnswers.forEach((ans, i) => {
    const div = document.createElement('div');
    div.className = 'led ' + (ans ? 'led-correct' : 'led-incorrect');
    div.textContent = String(i + 1);
    div.title = questions[i].category;
    grid.appendChild(div);
  });
}

function restart(){
  currentIndex = 0;
  score = 0;
  selectedIndex = null;
  answered = false;
  userAnswers = new Array(questions.length).fill(null);
  resultsScreen.hidden = true;
  quizCard.hidden = false;
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('restartBtn').addEventListener('click', restart);

renderQuestion();
</script>
